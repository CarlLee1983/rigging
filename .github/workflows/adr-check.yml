name: ADR Check

on:
  pull_request:
    branches: [main]

jobs:
  adr-check:
    # D-16: if a PR says it needs an ADR but adds no docs/decisions/*.md file, fail CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: adr-required
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s\n' "$PR_BODY" | grep -qE '\- \[x\] This PR introduces a decision that requires a new ADR'; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Require new ADR file when checkbox set
        id: adr-new-files
        if: steps.adr-required.outputs.required == 'true'
        run: |
          added=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'docs/decisions/*.md' | wc -l)
          if [ "$added" -eq 0 ]; then
            echo "::error::PR marked as requiring an ADR but no new docs/decisions/*.md added."
            exit 1
          fi
          echo "ADR check passed: $added new ADR(s) added."
      - name: Setup Bun
        if: steps.adr-required.outputs.required == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Cache bun deps
        if: steps.adr-required.outputs.required == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install dependencies
        if: steps.adr-required.outputs.required == 'true'
        run: bun install --frozen-lockfile
      - name: Validate new ADR MADR front matter
        if: steps.adr-required.outputs.required == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            bun run scripts/validate-adr-frontmatter.ts "$file"
          done < <(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}"...HEAD -- 'docs/decisions/*.md')
