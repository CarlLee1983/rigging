name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # D-11-D: cancel previous CI runs when a PR is force-pushed
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (biome check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test + coverage gate + migration drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rigging_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d rigging_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rigging_test
      BETTER_AUTH_SECRET: ${{ secrets.CI_BETTER_AUTH_SECRET || 'xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx' }}
      BETTER_AUTH_URL: http://localhost:3000
      NODE_ENV: test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Apply migrations
        run: bun run db:migrate

      - name: Test (with coverage)
        run: bun run test:ci

      - name: Coverage gate (>=80% on src/**/domain/ + src/**/application/)
        run: bun run coverage:gate

      - name: Migration drift check
        run: |
          bun run db:generate --name=ci-drift
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::Schema drift detected — run 'bun run db:generate' locally and commit the resulting migration."
            git status drizzle/
            git diff drizzle/
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7
