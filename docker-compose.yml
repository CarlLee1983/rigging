services:
  postgres:
    image: postgres:16-alpine
    container_name: rigging-postgres
    environment:
      POSTGRES_USER: rigging
      POSTGRES_PASSWORD: rigging_dev_password
      POSTGRES_DB: rigging
    ports:
      - '5432:5432'
    volumes:
      - rigging-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rigging -d rigging']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Optional: Adminer for quick DB browsing (uncomment to enable)
  # adminer:
  #   image: adminer:latest
  #   container_name: rigging-adminer
  #   ports:
  #     - '8080:8080'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  rigging-pg-data:
    driver: local
